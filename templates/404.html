<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | NutriVision Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/error.css') }}">
</head>
<body>
    <main class="error-shell">
        <a href="{{ url_for('index') }}" class="brand" aria-label="NutriVision Home">
            <span class="brand-badge">NV</span>
            <span>NutriVision Pro</span>
        </a>

        <p class="error-code">404</p>
        <h1 class="error-title">This page is not available</h1>
        <p class="error-message">
            The page you requested does not exist or may have moved. Use one of the links below to continue your nutrition workflow.
        </p>

        <div class="action-row">
            <a href="{{ url_for('index') }}" class="btn btn-solid">
                <i class="fa-solid fa-house"></i> Home
            </a>
            <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">
                <i class="fa-solid fa-chart-line"></i> Analyzer
            </a>
        </div>
    </main>
</body>
</html>
